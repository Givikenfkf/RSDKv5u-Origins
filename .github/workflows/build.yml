name: Build RSDKv5

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Verify Android dependencies
        run: |
          test -f dependencies/android/libogg/include/ogg/ogg.h
          test -f dependencies/android/libtheora/include/theora/theoradec.h
          test -e android/app/jni/Game

      - name: Build Android
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Show outputs
        run: |
          find android/app/build/outputs -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
          if-no-files-found: error
