name: Build RSDKv5

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip

      - name: Download Android dependencies
        run: |
          mkdir -p dependencies/android

          cd dependencies/android

          if [ ! -d libogg ]; then
            curl -L "https://downloads.xiph.org/releases/ogg/libogg-1.3.5.zip" -o libogg.zip
            unzip -q libogg.zip
            rm libogg.zip
            mv libogg-1.3.5 libogg
          fi

          if [ ! -d libtheora ]; then
            curl -L "https://downloads.xiph.org/releases/theora/libtheora-1.1.1.zip" -o libtheora.zip
            unzip -q libtheora.zip
            rm libtheora.zip
            mv libtheora-1.1.1 libtheora
          fi

      - name: Set up Game symlink
        run: |
          mkdir -p android/app/jni
          rm -f android/app/jni/Game
          ln -s "${GITHUB_WORKSPACE}" android/app/jni/Game

      - name: Verify Android setup
        run: |
          test -f dependencies/android/libogg/include/ogg/ogg.h
          test -f dependencies/android/libtheora/include/theora/theoradec.h
          test -e android/app/jni/Game

      - name: Build Android
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Show outputs
        run: |
          find android/app/build/outputs -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
          if-no-files-found: error
