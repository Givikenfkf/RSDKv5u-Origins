name: Build RSDKv5

on: workflow_dispatch

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Android
        run: |
          # Replace this with your repo's Android build command
          # Example:
          # ./gradlew assembleDebug
          echo "Run your Android build here"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            app/build/outputs/**
            build/outputs/**
