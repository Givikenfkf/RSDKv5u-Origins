name: Build RSDKv5

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Build Android
        run: |
          make -j"$(nproc)" RSDK_ONLY=1 PLATFORM=Android AUTOBUILD=1

      - name: Show build outputs
        run: |
          find . -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.so" -o -name "*.zip" \) | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            bin/Android/**
            **/*.apk
            **/*.aab
          if-no-files-found: error
